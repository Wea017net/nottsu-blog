<figure style="text-align: center; margin: 1.5rem 0;">
  <img src="{{ .Destination | safeURL }}" alt="{{ .Text }}" {{ with .Title }} title="{{ . }}" {{ end }} style="max-width: 100%; height: auto; display: block; margin: 0 auto; border-radius: 4px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);">
  {{ with .Text }}
    <figcaption style="display: block; font-size: 0.9rem; color: #718096; margin-top: 0.75rem; font-style: italic;">
      {{ . | safeHTML }}
    </figcaption>
  {{ end }}
</figure>
